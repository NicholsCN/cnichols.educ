<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Constance Nichols</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFDF9;
    --brown-deep: #3E2C1E;
    --brown-mid: #6B4A30;
    --brown-warm: #9A6E4A;
    --brown-light: #C9A882;
    --brown-pale: #EDE0CC;
    --slate-light: #C2CDD9;
    --slate-pale: #EBF0F5;
    --slate-dark: #4A6070;
    --gold: #B8922E;
    --gold-light: #DFC07A;
    --text-dark: #2A1C10;
    --text-mid: #5A3E28;
    --text-muted: #8A7060;
    --border: rgba(155,110,70,0.15);
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    line-height: 1.6;
  }

  nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(250,247,242,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    padding: 0 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 66px;
  }

  .nav-links {
    display: flex;
    gap: 2.2rem;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.74rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--text-mid);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.2s;
  }

  .nav-links a:hover {
    color: var(--gold);
  }

  .hero {
    min-height: 100vh;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8rem 5rem 5rem;
    gap: 5rem;
  }

  .hero-left {
    max-width: 650px;
  }

  .eyebrow {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(4rem, 8vw, 7rem);
    line-height: 0.95;
    font-weight: 300;
    color: var(--brown-deep);
    margin-bottom: 2rem;
  }

  .hero-ctas {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }

  .btn-primary,
  .btn-secondary {
    display: inline-block;
    text-decoration: none;
    padding: 0.95rem 1.9rem;
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border-radius: 2px;
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--brown-mid);
    color: var(--cream);
  }

  .btn-primary:hover {
    background: var(--brown-deep);
  }

  .btn-secondary {
    border: 1px solid var(--slate-dark);
    color: var(--slate-dark);
    background: transparent;
  }

  .btn-secondary:hover {
    background: var(--slate-dark);
    color: var(--cream);
  }

  .btn-visit {
    display: inline-block;
    margin-top: 1.25rem;
    border: 1px solid var(--brown-mid);
    color: var(--brown-mid);
    padding: 0.6rem 1.6rem;
    border-radius: 2px;
    text-decoration: none;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    transition: all 0.2s;
    width: fit-content;
  }

  .btn-visit:hover {
    background: rgba(107,74,48,0.07);
    color: var(--brown-deep);
  }

  .hero-right {
    flex-shrink: 0;
  }

  .portrait-frame {
    width: 280px;
    position: relative;
  }

  .portrait-frame::before {
    content: '';
    position: absolute;
    top: -12px;
    left: -12px;
    right: 12px;
    bottom: 12px;
    border: 1px solid var(--gold-light);
    z-index: 0;
    pointer-events: none;
  }

  .hero-photo {
    width: 280px;
    height: 340px;
    object-fit: cover;
    object-position: center top;
    display: block;
    border-radius: 2px;
    position: relative;
    z-index: 1;
  }

  .gold-footer-line {
    height: 2px;
    background: linear-gradient(to right, var(--gold), transparent);
  }

  footer {
    background: var(--slate-dark);
    color: rgba(250,247,242,0.38);
    padding: 2rem 5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.74rem;
    letter-spacing: 0.06em;
  }

  .footer-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 300;
    color: rgba(250,247,242,0.55);
  }

  @media (max-width: 900px) {
    .hero {
      flex-direction: column;
      text-align: center;
      padding: 7rem 2rem 4rem;
    }

    .hero-ctas {
      justify-content: center;
    }

    .nav-links {
      gap: 1rem;
      font-size: 0.65rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    nav {
      padding: 0 1.5rem;
    }
  }
</style>
</head>

<body>

<nav>
  <a href="index.html"
     style="display:flex;align-items:center;color:#C9A882;text-decoration:none;transition:color 0.2s;"
     onmouseover="this.style.color='#9A6E4A'"
     onmouseout="this.style.color='#C9A882'"
     aria-label="Home">
    <svg xmlns="http://www.w3.org/2000/svg"
         width="16"
         height="16"
         viewBox="0 0 24 24"
         fill="none"
         stroke="currentColor"
         stroke-width="1.5"
         stroke-linecap="round"
         stroke-linejoin="round">
      <path d="M3 9.75L12 3l9 6.75V21a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.75z"/>
      <path d="M9 22V12h6v10"/>
    </svg>
  </a>

  <ul class="nav-links">
    <li><a href="about.html">About</a></li>
    <li><a href="projects.html">Projects &amp; Initiatives</a></li>
    <li><a href="pedagogy.html">Pedagogy</a></li>
    <li><a href="programs.html">Programs</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="https://substack.com/@cnicholseduc" target="_blank">Substack</a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-left">
    <p class="eyebrow">Education · Community · Policy</p>

    <h1 class="hero-name">
      Dr. Constance<br>Nichols
    </h1>

    <div class="hero-ctas">
      <a href="/projects.html" class="btn-primary">Explore My Work</a>
      <a href="contact.html" class="btn-secondary">Work With Me</a>
    </div>

    <a href="/campus-visit/index.html" class="btn-visit">
      Teaching Demonstration
    </a>
  </div>

  <div class="hero-right">
    <div class="portrait-frame">
      <img
        src="images/constance-nichols-portrait.png"
        alt="Dr. Constance Nichols"
        class="hero-photo"
      />
    </div>
  </div>
</section>

<div class="gold-footer-line"></div>

<footer>
  <div class="footer-name">Dr. Constance Nichols</div>
  <div>© 2026</div>
</footer>

</body>
</html>
