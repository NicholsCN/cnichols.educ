<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFDF9;
    --brown-deep: #3E2C1E;
    --brown-mid: #6B4A30;
    --brown-warm: #9A6E4A;
    --brown-light: #C9A882;
    --brown-pale: #EDE0CC;
    --slate-light: #C2CDD9;
    --slate-pale: #EBF0F5;
    --slate-dark: #4A6070;
    --gold: #B8922E;
    --gold-light: #DFC07A;
    --text-dark: #2A1C10;
    --text-mid: #5A3E28;
    --text-muted: #8A7060;
    --border: rgba(155,110,70,0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    line-height: 1.6;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(250,247,242,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    padding: 0 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 66px;
  }

  .nav-home {
    display: inline-block;
    width: 28px;
    height: 28px;
    position: relative;
    opacity: 0.4;
    transition: opacity 0.2s;
    text-decoration: none;
  }

  .nav-home:hover { opacity: 0.75; }

  .nav-home::before,
  .nav-home::after {
    content: '';
    position: absolute;
    background: var(--brown-deep);
  }

  .nav-home::before {
    width: 100%; height: 1px;
    top: 50%; left: 0;
  }

  .nav-home::after {
    width: 1px; height: 100%;
    top: 0; left: 50%;
  }

  .nav-links {
    display: flex;
    gap: 2.2rem;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.74rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--text-mid);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--gold); }

  /* HERO */
  .hero {
    min-height: 100vh;
    padding-top: 66px;
    display: flex;
    align-items: center;
    background: var(--warm-white);
    padding-left: 5rem;
    padding-right: 5rem;
    gap: 6rem;
  }

  .hero-left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 4rem 0;
  }

  .eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 1.75rem;
    display: flex;
    align-items: center;
    gap: 0.85rem;
  }

  .eyebrow::before {
    content: '';
    display: inline-block;
    width: 2.5rem;
    height: 1px;
    background: var(--gold);
    flex-shrink: 0;
  }

  .hero-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 4.5vw, 4rem);
    font-weight: 300;
    line-height: 1.05;
    color: var(--text-dark);
    margin-bottom: 3rem;
  }

  .hero-name em {
    font-style: italic;
    color: var(--brown-warm);
  }

  .hero-ctas {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .btn-primary {
    background: var(--brown-deep);
    color: var(--cream);
    padding: 0.8rem 2rem;
    border-radius: 2px;
    text-decoration: none;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    transition: background 0.2s, transform 0.15s;
    display: inline-block;
  }

  .btn-primary:hover { background: var(--brown-mid); transform: translateY(-1px); }

  .btn-secondary {
    border: 1px solid var(--slate-dark);
    color: var(--slate-dark);
    padding: 0.8rem 2rem;
    border-radius: 2px;
    text-decoration: none;
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 400;
    transition: all 0.2s;
    display: inline-block;
  }

  .btn-secondary:hover { background: var(--slate-dark); color: var(--cream); }

  .btn-visit {
    display: inline-block;
    margin-top: 1.25rem;
    border: 1px solid var(--brown-mid);
    color: var(--brown-mid);
    padding: 0.6rem 1.6rem;
    border-radius: 2px;
    text-decoration: none;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    transition: all 0.2s;
    width: fit-content;
  }
  .btn-visit:hover {
    background: rgba(107,74,48,0.07);
    color: var(--brown-deep);
  }

  /* PORTRAIT */
  .hero-right { flex-shrink: 0; }

  .portrait-frame {
    width: 280px;
    position: relative;
  }

  .portrait-frame::before {
    content: '';
    position: absolute;
    top: -12px; left: -12px;
    right: 12px; bottom: 12px;
    border: 1px solid var(--gold-light);
    z-index: 0;
    pointer-events: none;
  }

  .hero-photo {
    width: 280px;
    height: 340px;
    object-fit: cover;
    object-position: center top;
    display: block;
    border-radius: 2px;
    position: relative;
    z-index: 1;
  }

  /* FOOTER */
  .gold-footer-line {
    height: 2px;
    background: linear-gradient(to right, var(--gold), transparent);
  }

  footer {
    background: var(--slate-dark);
    color: rgba(250,247,242,0.38);
    padding: 2rem 5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.74rem;
    letter-spacing: 0.06em;
  }

  .footer-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 300;
    color: rgba(250,247,242,0.55);
  }
</style>
</head>
