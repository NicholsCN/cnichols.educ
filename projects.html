<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects & Initiatives — Dr. Constance Nichols</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF7F2;
    --warm-white: #FFFDF9;
    --brown-mid: #6B4A30;
    --brown-light: #C9A882;
    --brown-pale: #EDE0CC;
    --slate-light: #C2CDD9;
    --slate-pale: #EBF0F5;
    --slate-dark: #4A6070;
    --slate-mid: #6A8599;
    --gold: #B8922E;
    --gold-light: #DFC07A;
    --text-dark: #2A1C10;
    --text-mid: #5A3E28;
    --text-muted: #8A7060;
    --border: rgba(155,110,70,0.15);
    --slate-border: rgba(74,96,112,0.2);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    line-height: 1.6;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(250,247,242,0.97);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    z-index: 100;
    padding: 0 3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 66px;
  }

  .nav-links {
    display: flex;
    gap: 2.2rem;
    list-style: none;
  }

  .nav-links a {
    font-size: 0.74rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--text-mid);
    text-decoration: none;
    font-weight: 400;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--gold); }
  .nav-links a.active { color: var(--gold); }

  .page-header {
    padding: 8rem 5rem 3.5rem;
    background: var(--warm-white);
    border-bottom: 1px solid var(--border);
  }

  .page-eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.85rem;
  }

  .page-eyebrow::before {
    content: '';
    display: inline-block;
    width: 2rem;
    height: 1px;
    background: var(--gold);
    flex-shrink: 0;
  }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.2rem, 4vw, 3.2rem);
    font-weight: 300;
    color: var(--text-dark);
    margin-bottom: 1.25rem;
    line-height: 1.1;
  }

  .page-intro {
    font-size: 0.95rem;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.85;
    max-width: 60ch;
  }

  .section-block {
    padding: 3.5rem 5rem 0;
  }

  .section-divider {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    margin-bottom: 2rem;
  }

  .section-divider-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem;
    font-weight: 300;
    color: var(--text-dark);
    white-space: nowrap;
  }

  .section-divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.25rem;
    padding-bottom: 1rem;
  }

  .project-card {
    background: var(--warm-white);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2rem 2.25rem;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .project-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }

  .project-card:hover::before { transform: scaleX(1); }
  .project-card:hover { transform: translateY(-3px); }

  .project-label {
    font-size: 0.65rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 0.6rem;
  }

  .project-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--text-dark);
    margin-bottom: 0.2rem;
    line-height: 1.2;
  }

  .project-role {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    margin-bottom: 0.85rem;
    font-style: italic;
  }

  .project-body {
    font-size: 0.86rem;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.8;
  }

  .project-link {
    display: inline-block;
    margin-top: 0.85rem;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--slate-dark);
    text-decoration: none;
    border-bottom: 1px solid var(--slate-border);
    padding-bottom: 0.15rem;
    transition: color 0.2s, border-color 0.2s;
  }

  .project-link:hover { color: var(--gold); border-color: var(--gold); }

  .past-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    padding-bottom: 1rem;
  }

  .past-card {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1.6rem 1.75rem;
    transition: background 0.2s;
  }

  .past-card:hover { background: var(--warm-white); }

  .past-label {
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 0.4rem;
  }

  .past-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text-dark);
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }

  .past-body {
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.75;
  }

  .policy-block {
    padding: 3.5rem 5rem 0;
  }

  .policy-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
    padding-bottom: 1rem;
  }

  .policy-card {
    background: var(--slate-pale);
    border: 1px solid var(--slate-border);
    border-radius: 3px;
    padding: 1.6rem 1.75rem;
    transition: background 0.2s;
  }

  .policy-card:hover { background: #dce7ef; }

  .policy-label {
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--slate-mid);
    font-weight: 500;
    margin-bottom: 0.4rem;
  }

  .policy-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.05rem;
    font-weight: 400;
    color: var(--text-dark);
    margin-bottom: 0.5rem;
    line-height: 1.3;
  }

  .policy-body {
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.75;
  }

  .affiliations-block {
    padding: 3.5rem 5rem 5rem;
  }

  .affil-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3rem;
  }

  .affil-group-label {
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 500;
    margin-bottom: 1.25rem;
  }

  .affil-list {
    list-style: none;
  }

  .affil-item {
    padding: 0.65rem 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.86rem;
    font-weight: 300;
    color: var(--text-mid);
    line-height: 1.5;
  }

  .affil-item:last-child { border-bottom: none; }

  .gold-footer-line {
    height: 2px;
    background: linear-gradient(to right, var(--gold), transparent);
  }

  footer {
    background: #4A6070;
    color: rgba(250,247,242,0.38);
    padding: 2rem 5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.74rem;
    letter-spacing: 0.06em;
  }

  .footer-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 300;
    color: rgba(250,247,242,0.55);
  }
</style>
</head>
